name: Deploy Game Factory Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Go to app folder
            cd ~/apps/game_factory_frontend

            # Clean local changes
            git reset --hard
            git clean -fd

            # Pull latest code
            git pull origin main

            # Install dependencies and build
            npm ci
            npm run build
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/static
            if [ -d public ]; then
              cp -r public .next/standalone/public
            fi

            # Reload if PM2 process exists, else start it from ecosystem file
            if pm2 describe game_frontend > /dev/null 2>&1; then
              pm2 reload ecosystem.config.js --only game_frontend --update-env
            else
              pm2 start ecosystem.config.js --only game_frontend
            fi

            # Save PM2 process list
            pm2 save
